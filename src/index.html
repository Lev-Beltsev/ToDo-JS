<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width>
    <title>ToDO List</title>
    <link rel="stylesheet" href="./styles/index.css"> 
    <script> src=script.js </script>
</head>
<body> 
        <div class="todo" data-js-todo>
        <h1 class="todo__title">To Do List </h1>
        <form class="todo__form" data-js-todo-new-task-form> 
            <div class="todo__filed field">
                <label
                 for="new-task" class="field__label"> New task title</label>
                 <input class="field__input"
                  id="new-task"
                  placeholder=" "  data-js-todo-new-task-input> 
                
                </input>
            </div>
        </form>
        <button class="button" type="submit">Add</button>
        <form class="todo__form" data-js-todo-new-serch-form 
            <div class="todo__filed field">
                <label
                 for="search-task" class="field__label"> Search task</label>
                 <input class="field__input"
                  id="search-task"
                  placeholder=" "
                  >
                </input>
            </div>
        </form>
       <div class="todo__info">
        
        <div class="total__task"> Total Task: <span data-js-todo-total-task>0</span> </div>
        <button class="delete__all-button" type="button " data-js-todo-delete-all-button> Delete All</button>
        <ul class="todo__list" data-js-todo-list>
            <li class="todo__item todo-item" data-js-todo-item">
            <input data-js-todo-serch-task-input
            class="input__todo"
            id="todo-1"
            type="checkbox" 
            data-js-todo-item-checkbox
            /> 
            <label class="todo__item-label" for="todo-1" data-js-todo-item-label> Todo 1 
            </label>
            <button 
            class="todo__item-delete-button" 
            type="button" 
            aria-label="delete"
            title="delete"
            data-js-todo-item-delete-button> 
            
            </button>
            </li>
        </ul>
            
        <ul class="todo__list" > 
            <li  class="todo__item todo-item" data-js-todo-item">
            <input  data-js-todo-serch-task-input
            class="input__todo"
            id="todo-1"
            type="checkbox" 
            data-js-todo-item-checkbox
            /> 
            <label class="todo__item-label" for="todo-1" data-js-todo-item-label> Todo 1 
            </label>
            <button 
            class="todo__item-delete-button"
            type="button" 
            aria-label="delete"
            title="delete"
            data-js-todo-item-delete-button> 
         </button>
         </li>
        </ul>
        <div class="todo-message" data-js-todo-message></div>
       </div>
        </div>
</body>
</html>
